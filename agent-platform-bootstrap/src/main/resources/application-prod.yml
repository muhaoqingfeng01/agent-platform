# ============================================================
# Production Profile Configuration
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      minimum-idle: 20
      maximum-pool-size: 100

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-connections: 5000
    threads:
      max: 500
      min-spare: 50

# Sa-Token Redis 集成（生产环境必须启用）
sa-token:
  alone-redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:1}

milvus:
  connect-timeout-ms: 30000
  keep-alive-time-ms: 300000

langfuse:
  enabled: true

# ============================================================
# Logging Override（prod 环境）
# ============================================================
# 日志级别在 logback-spring.xml 的 <springProfile name="prod"> 中管理
app:
  logging:
    base-path: /var/log
    max-file-size: 300MB
    max-history-days: 90
    total-size-cap: 50GB
